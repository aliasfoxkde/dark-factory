# Dark Factory pre-commit configuration
# ─────────────────────────────────────────────────────────────────────────────
# Installation: pip install pre-commit && pre-commit install
# Or: go install github.com/alpha。二乗.pre-commit/cmd/pre-commit@latest
# ─────────────────────────────────────────────────────────────────────────────
repos:
  # ─── Local Go hooks ─────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: go-test
        name: go test
        entry: go test -p 1 -timeout 5m ./...
        language: system
        pass_filenames: false
        types: [go]

      - id: go-vet
        name: go vet
        entry: go vet ./...
        language: system
        pass_filenames: false
        types: [go]

      - id: go-fmt
        name: gofmt
        entry: gofmt -l .
        language: system
        pass_filenames: false
        types: [go]
        stages: [commit]

      - id: go-build
        name: go build
        entry: go build ./...
        language: system
        pass_filenames: false
        types: [go]

      - id: go-mod-tidy
        name: go mod tidy
        entry: go mod tidy
        language: system
        pass_filenames: false
        stages: [commit]

  # ─── Remote hooks ───────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        args: ['--markdown-linebreak-ext=md']

      - id: end-of-file-fixer

      - id: check-yaml
        args: ['--allow-multiple-documents']

      - id: check-added-large-files
        args: ['--maxkb=1000']

      - id: check-merge-conflict

      - id: check-case-conflict

      - id: detect-private-key
        exclude: '^tests/fixtures/'

      - id: detect-aws-credentials
        exclude: '^tests/fixtures/'

      - id: mixed-line-ending
        args: ['--fix=no']
        description: Detect and report mixed line endings (does not fix)

  # ─── Golangci-lint via pre-commit ────────────────────────────────────────
  - repo: https://github.com/golangci-lint/golangci-lint
    rev: v2.1.6
    hooks:
      - id: golangci-lint
        args: ['--timeout=5m']
        description: Run golangci-lint linter
