name: Auto Merge

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  try-merge:
    # Only act on PRs from the same owner (no forks auto-merging)
    if: github.event.pull_request.user.login == github.event.repository.owner.login
    runs-on: ubuntu-latest
    steps:
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        name: Attempt auto-merge
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}

          # Attempt to enable auto-merge; silently succeeds or fails
          # Branch protection or conflicts may block this — that's fine
          gh pr merge $PR_NUMBER --squash --delete-branch --auto || true
