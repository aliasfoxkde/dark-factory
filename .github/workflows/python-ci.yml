name: Python CI

on:
  push:
    branches: [$default-branch]
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/python-ci.yml'
  pull_request:
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/python-ci.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DEFAULT_BRANCH: ${{ vars.DEFAULT_BRANCH || 'main' }}
  UV_VERSION: '0.5.18'
  COVERAGE_THRESHOLD: ${{ vars.PYTHON_COVERAGE_THRESHOLD || 70 }}
  PYTHON_VERSIONS: ${{ vars.PYTHON_VERSIONS || '["3.11","3.12","3.13"]' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: ${{ env.UV_VERSION }}

      - name: Lint with ruff
        run: |
          uv run ruff check . --output-format=github

      - name: Format check
        run: |
          uv run ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: ${{ env.UV_VERSION }}

      - name: Install dependencies
        run: uv sync --frozen-lockfile

      - name: Run mypy
        run: uv run mypy src/ --no-error-summary

  test:
    strategy:
      fail-fast: false
      matrix:
        python: ${{ fromJSON(env.PYTHON_VERSIONS) }}
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: ${{ env.UV_VERSION }}

      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Install dependencies
        run: uv sync --frozen-lockfile

      - name: Run unit tests
        run: uv run pytest -m unit --timeout=60 -v

      - name: Run integration tests
        run: uv run pytest -m integration --timeout=120 -v

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage

  coverage:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: ${{ env.UV_VERSION }}

      - name: Install dependencies
        run: uv sync --frozen-lockfile

      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-report

      - name: Check coverage threshold
        run: |
          uv run coverage report --precision=2
          uv run coverage report --fail-under=${{ env.COVERAGE_THRESHOLD }}

      - name: Upload to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: .coverage
          flags: unittests
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: ${{ env.UV_VERSION }}

      - name: Build wheel
        run: |
          uv build

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: ${{ env.UV_VERSION }}

      - name: Audit dependencies
        run: uv pip audit || true

  e2e:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, 'e2e')
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: ${{ env.UV_VERSION }}

      - name: Install dependencies
        run: uv sync --frozen-lockfile --extra e2e

      - name: Install Playwright
        run: uv run playwright install --with-deps chromium

      - name: Run E2E tests
        run: uv run pytest -m e2e --timeout=300 -v

# Required checks: lint, typecheck, test (all python versions), build, vuln, coverage